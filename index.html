<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Châu Âu Huyền Diệu | Vietkite Travel</title>
  <meta name="description" content="Tour Châu Âu cao cấp cùng Vietkite Travel: Tây Âu, Đông Âu, Bắc Âu, khách sạn 4 sao, hỗ trợ Visa Schengen và trưởng đoàn tận tâm." />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="https://tourchauauvietkite.click/" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="vi_VN" />
  <meta property="og:site_name" content="Vietkite Travel" />
  <meta property="og:title" content="Châu Âu Huyền Diệu | Vietkite Travel" />
  <meta property="og:description" content="Tour Châu Âu cao cấp cùng Vietkite Travel: Tây Âu, Đông Âu, Bắc Âu, khách sạn 4 sao, hỗ trợ Visa Schengen và trưởng đoàn tận tâm." />
  <meta property="og:image" content="/CHÂU ÂU/Tháp Eiffel va khải hoàn môn.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="theme-color" content="#0e1a2a" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    :root{
      --bg:#0d1724;
      --bg-soft:#132238;
      --card:#fffdf8;
      --ink:#132238;
      --muted:#6b7280;
      --cream:#fff7e8;
      --gold:#d7a84f;
      --gold-dark:#9b6a21;
      --accent:#1c7c73;
      --white:#ffffff;
      --shadow:0 24px 70px rgba(13,23,36,.18);
      --radius:28px;
      --font-heading:Georgia,'Times New Roman',serif;
      --font-body:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:var(--font-body);
      color:var(--ink);
      background:var(--cream);
      line-height:1.6;
      overflow-x:hidden;
    }
    body.menu-open{overflow:hidden}
    img{max-width:100%;display:block}
    a{color:inherit;text-decoration:none}
    button,input,select{font:inherit}

    .site-loader{
      min-height:100vh;
      display:grid;
      place-items:center;
      background:radial-gradient(circle at top,var(--bg-soft),var(--bg));
      color:var(--cream);
      padding:24px;
      text-align:center;
    }
    .site-loader__mark{
      width:64px;height:64px;border-radius:50%;
      border:1px solid rgba(215,168,79,.45);
      border-top-color:var(--gold);
      animation:spin 1s linear infinite;
      margin:0 auto 18px;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    .site-shell{display:none;min-height:100vh;background:var(--cream)}
    .site-shell.is-ready{display:block}

    .container{width:min(1160px,calc(100% - 40px));margin-inline:auto}
    .section{padding:96px 0;position:relative}
    .section--dark{background:var(--bg);color:var(--white)}
    .section--soft{background:#fbf0d9}
    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      color:var(--gold-dark);
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
      font-size:.76rem;
    }
    .section--dark .eyebrow{color:#f2d694}
    .eyebrow::before,.eyebrow::after{content:"";width:28px;height:1px;background:currentColor;opacity:.65}
    h1,h2,h3,p{margin:0}
    h1,h2,h3{font-family:var(--font-heading);font-weight:700;line-height:1.05;letter-spacing:-.035em}
    h1{font-size:clamp(3rem,9vw,7.8rem)}
    h2{font-size:clamp(2.35rem,5.4vw,4.8rem)}
    h3{font-size:clamp(1.35rem,2.4vw,2rem)}
    .lead{font-size:clamp(1rem,2vw,1.24rem);color:rgba(255,255,255,.82);max-width:680px}
    .section-intro{display:grid;gap:18px;max-width:760px;margin-bottom:42px}
    .text-muted{color:var(--muted)}

    .topbar{
      position:fixed;
      inset:0 0 auto 0;
      z-index:100;
      padding:16px 0;
      transition:.25s ease;
      color:var(--white);
    }
    .topbar.is-scrolled{
      background:rgba(13,23,36,.88);
      backdrop-filter:blur(16px);
      box-shadow:0 16px 50px rgba(0,0,0,.18);
    }
    .nav{
      width:min(1220px,calc(100% - 32px));
      margin:auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
    }
    .brand{display:flex;align-items:center;gap:12px;font-weight:900;letter-spacing:.12em;text-transform:uppercase}
    .brand-logo{width:42px;height:42px;border-radius:50%;object-fit:cover;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28)}
    .brand-name{font-size:.95rem}
    .nav-links{display:flex;align-items:center;gap:8px}
    .nav-link{padding:10px 13px;border-radius:999px;font-weight:700;font-size:.92rem;color:rgba(255,255,255,.86);transition:.2s ease}
    .nav-link:hover{background:rgba(255,255,255,.12);color:#fff}
    .nav-cta{background:var(--gold);color:#241600;padding:11px 17px;border-radius:999px;font-weight:900;box-shadow:0 12px 34px rgba(215,168,79,.28)}
    .menu-toggle{display:none;border:0;background:rgba(255,255,255,.14);color:#fff;border-radius:14px;padding:10px 12px;font-weight:900}

    .hero{
      position:relative;
      min-height:100vh;
      color:#fff;
      display:grid;
      align-items:center;
      overflow:hidden;
      isolation:isolate;
      background:var(--bg);
      padding:120px 0 72px;
    }
    .hero-bg{position:absolute;inset:0;z-index:-3}
    .hero-bg img{width:100%;height:100%;object-fit:cover;filter:saturate(1.06) contrast(1.04)}
    .hero::before{
      content:"";
      position:absolute;inset:0;
      z-index:-2;
      background:
        linear-gradient(90deg,rgba(9,17,30,.92),rgba(9,17,30,.62) 46%,rgba(9,17,30,.24)),
        linear-gradient(0deg,rgba(9,17,30,.86),transparent 42%);
    }
    .hero::after{
      content:"";
      position:absolute;inset:auto 0 0 0;height:160px;z-index:-1;
      background:linear-gradient(0deg,var(--cream),transparent);
    }
    .hero-grid{display:grid;grid-template-columns:1.05fr .65fr;gap:52px;align-items:end}
    .hero-copy{display:grid;gap:24px;max-width:820px}
    .hero-title span{display:block;color:#f6d894;text-shadow:0 8px 38px rgba(215,168,79,.22)}
    .hero-actions{display:flex;flex-wrap:wrap;gap:14px;margin-top:8px}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:10px;
      min-height:52px;padding:14px 22px;border-radius:999px;
      border:1px solid transparent;font-weight:900;cursor:pointer;transition:.22s ease;
    }
    .btn-primary{background:var(--gold);color:#241600;box-shadow:0 18px 45px rgba(215,168,79,.28)}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 24px 55px rgba(215,168,79,.38)}
    .btn-ghost{background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.24);backdrop-filter:blur(10px)}
    .btn-ghost:hover{background:rgba(255,255,255,.18)}
    .hero-card{
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.18);
      border-radius:var(--radius);
      padding:26px;
      backdrop-filter:blur(18px);
      box-shadow:0 28px 80px rgba(0,0,0,.22);
    }
    .hero-card__label{color:#f6d894;font-weight:900;text-transform:uppercase;letter-spacing:.12em;font-size:.76rem;margin-bottom:8px}
    .hero-card__number{font-family:var(--font-heading);font-size:3rem;line-height:1;color:#fff;margin-bottom:8px}
    .hero-card__text{color:rgba(255,255,255,.76)}

    .about-grid{display:grid;grid-template-columns:.9fr 1.1fr;gap:52px;align-items:center}
    .about-media{position:relative;min-height:540px}
    .about-media img{position:absolute;object-fit:cover;border-radius:30px;box-shadow:var(--shadow)}
    .about-media img:first-child{width:66%;height:78%;left:0;top:0}
    .about-media img:last-child{width:56%;height:62%;right:0;bottom:0;border:8px solid var(--cream)}
    .rich-text{font-size:1.06rem;color:#374151;display:grid;gap:18px}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:30px}
    .stat{background:#fff;border:1px solid rgba(155,106,33,.16);border-radius:24px;padding:22px;box-shadow:0 18px 45px rgba(19,34,56,.08)}
    .stat-number{font-family:var(--font-heading);font-size:2.5rem;color:var(--gold-dark);line-height:1}
    .stat-label{font-weight:800;color:#536076;margin-top:6px}

    .tour-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
    .tour-card{
      background:#fff;
      border-radius:30px;
      overflow:hidden;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      min-height:100%;
      position:relative;
      border:1px solid rgba(155,106,33,.12);
    }
    .tour-badge{position:absolute;top:18px;left:18px;z-index:2;background:rgba(13,23,36,.84);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:999px;padding:8px 12px;font-weight:900;font-size:.8rem;backdrop-filter:blur(10px)}
    .tour-image{height:250px;overflow:hidden;background:#ddd}
    .tour-image img{width:100%;height:100%;object-fit:cover;transition:.45s ease}
    .tour-card:hover .tour-image img{transform:scale(1.055)}
    .tour-body{padding:24px;display:flex;flex-direction:column;gap:16px;flex:1}
    .tour-meta{display:flex;justify-content:space-between;gap:12px;color:var(--gold-dark);font-weight:900;text-transform:uppercase;font-size:.78rem;letter-spacing:.08em}
    .tour-route{color:#536076;font-weight:700}
    .check-list{display:grid;gap:9px;list-style:none;padding:0;margin:0}
    .check-list li{display:flex;gap:10px;align-items:flex-start;color:#374151;font-weight:650}
    .check-list li::before{content:"✓";color:var(--accent);font-weight:1000}
    .price-row{display:flex;align-items:end;gap:10px;margin-top:auto}
    .old-price{text-decoration:line-through;color:#9ca3af;font-weight:800}
    .new-price{font-family:var(--font-heading);font-size:1.8rem;color:var(--gold-dark);font-weight:800}
    .tour-card .btn{width:100%;margin-top:4px}

    .gallery-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
    .gallery-item{position:relative;overflow:hidden;border-radius:24px;background:#ddd;aspect-ratio:4/5;box-shadow:0 12px 36px rgba(19,34,56,.1)}
    .gallery-item:nth-child(6n+1),.gallery-item:nth-child(6n+4){aspect-ratio:1/1}
    .gallery-item img{width:100%;height:100%;object-fit:cover;transition:.45s ease}
    .gallery-item:hover img{transform:scale(1.055)}
    .gallery-caption{position:absolute;inset:auto 10px 10px 10px;background:rgba(13,23,36,.78);color:#fff;padding:10px 12px;border-radius:15px;font-size:.84rem;font-weight:800;backdrop-filter:blur(12px)}

    .pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;align-items:stretch}
    .price-card{background:#fff;border-radius:30px;padding:28px;box-shadow:var(--shadow);border:1px solid rgba(215,168,79,.18);position:relative;display:grid;gap:18px}
    .price-card.is-featured{background:linear-gradient(180deg,#15243b,#0d1724);color:#fff;transform:translateY(-16px)}
    .price-tag{position:absolute;top:16px;right:16px;background:var(--gold);color:#231600;border-radius:999px;padding:7px 12px;font-weight:1000;font-size:.75rem;text-transform:uppercase;letter-spacing:.08em}
    .price-subtitle{font-weight:900;color:var(--gold-dark);text-transform:uppercase;letter-spacing:.08em;font-size:.82rem}
    .price-card.is-featured .price-subtitle{color:#f4d68e}
    .price-card .old-price{font-size:1rem}
    .price-card .new-price{font-size:2.2rem}
    .price-card.is-featured .new-price{color:#f4d68e}

    .testimonials{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
    .testimonial{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:30px;padding:24px;display:grid;gap:18px}
    .stars{color:#f4d68e;letter-spacing:.08em}
    .quote{color:rgba(255,255,255,.84);font-size:1rem}
    .person{display:flex;align-items:center;gap:14px;margin-top:auto}
    .person img{width:58px;height:58px;border-radius:50%;object-fit:cover;border:2px solid rgba(244,214,142,.55)}
    .person strong{display:block;color:#fff}
    .person span{display:block;color:rgba(255,255,255,.6);font-size:.9rem}

    .cta-wrap{display:grid;grid-template-columns:.85fr 1fr;gap:32px;align-items:stretch}
    .countdown-card,.form-card{background:#fff;border-radius:32px;box-shadow:var(--shadow);padding:32px;border:1px solid rgba(215,168,79,.18)}
    .countdown-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:22px}
    .time-box{background:linear-gradient(180deg,#fff8e7,#f3dfb2);border-radius:20px;padding:16px 10px;text-align:center;border:1px solid rgba(155,106,33,.16)}
    .time-number{font-family:var(--font-heading);font-size:2rem;color:var(--gold-dark);font-weight:800;line-height:1}
    .time-label{font-weight:900;color:#536076;font-size:.8rem;margin-top:6px}
    .form{display:grid;gap:12px;margin-top:22px}
    .field{display:grid;gap:6px}
    .field label{font-weight:900;color:#374151;font-size:.88rem}
    .field input,.field select{
      width:100%;border:1px solid rgba(19,34,56,.14);background:#fffaf0;border-radius:16px;padding:14px 15px;outline:none;color:var(--ink);
    }
    .field input:focus,.field select:focus{border-color:var(--gold);box-shadow:0 0 0 4px rgba(215,168,79,.16)}
    .form-note{font-size:.88rem;color:var(--muted);font-weight:700;text-align:center;margin-top:4px}
    .success-message{display:none;margin-top:16px;padding:16px;border-radius:18px;background:#ebf9f5;color:#0f766e;font-weight:900;text-align:center}
    .success-message.is-visible{display:block}

    .footer{background:#08111d;color:#fff;padding:56px 0 28px}
    .footer-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:36px;align-items:start}
    .footer-logo{width:92px;height:92px;border-radius:22px;object-fit:cover;background:#fff;margin-bottom:18px}
    .footer p,.footer li{color:rgba(255,255,255,.72)}
    .footer h3{font-size:1.55rem;margin-bottom:10px}
    .contact-list{list-style:none;padding:0;margin:16px 0 0;display:grid;gap:10px}
    .copyright{border-top:1px solid rgba(255,255,255,.1);margin-top:34px;padding-top:24px;color:rgba(255,255,255,.58);font-size:.9rem;display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap}
    .zalo-float{position:fixed;right:18px;bottom:18px;z-index:90;background:#0877ff;color:#fff;border-radius:999px;padding:13px 18px;font-weight:1000;box-shadow:0 18px 48px rgba(8,119,255,.35);display:flex;align-items:center;gap:8px}
    .zalo-float:hover{transform:translateY(-2px)}

    .hidden-netlify-form{display:none}

    @media (max-width: 960px){
      .container{width:min(100% - 28px,720px)}
      .nav-links{
        position:fixed;inset:74px 14px auto 14px;
        background:rgba(13,23,36,.96);
        border:1px solid rgba(255,255,255,.12);
        border-radius:24px;
        padding:14px;
        display:none;
        flex-direction:column;
        align-items:stretch;
        box-shadow:0 24px 80px rgba(0,0,0,.28);
      }
      .nav-links.is-open{display:flex}
      .nav-link,.nav-cta{text-align:center}
      .menu-toggle{display:inline-flex}
      .hero-grid,.about-grid,.cta-wrap,.footer-grid{grid-template-columns:1fr}
      .hero{min-height:860px;padding-top:112px}
      .hero-card{max-width:420px}
      .about-media{min-height:420px;order:-1}
      .tour-grid,.pricing-grid,.testimonials{grid-template-columns:1fr}
      .price-card.is-featured{transform:none}
      .gallery-grid{grid-template-columns:repeat(2,1fr)}
      .stats,.countdown-grid{grid-template-columns:repeat(2,1fr)}
      .section{padding:72px 0}
    }
    @media (max-width: 560px){
      .brand-name{font-size:.82rem;letter-spacing:.08em}
      .hero-actions .btn{width:100%}
      .gallery-grid{gap:10px}
      .gallery-caption{font-size:.74rem;padding:8px 10px}
      .countdown-card,.form-card{padding:24px}
      .stats{grid-template-columns:1fr}
      .time-number{font-size:1.55rem}
      .zalo-float{left:14px;right:14px;justify-content:center}
    }
  </style>
</head>
<body>
  <div class="site-loader" id="site-loader">
    <div>
      <div class="site-loader__mark" aria-hidden="true"></div>
      <strong>Đang tải nội dung website...</strong>
      <p style="opacity:.72;margin-top:8px">Nếu khách sửa trong CMS, nội dung sẽ tự cập nhật tại đây.</p>
    </div>
  </div>

  <div class="site-shell" id="site-shell">
    <header class="topbar" id="topbar">
      <nav class="nav" aria-label="Điều hướng chính">
        <a class="brand" href="#home" aria-label="Trang chủ">
          <img class="brand-logo" id="brand-logo" alt="" />
          <span class="brand-name" id="brand-name"></span>
        </a>
        <button class="menu-toggle" id="menu-toggle" type="button" aria-label="Mở menu">☰</button>
        <div class="nav-links" id="nav-links"></div>
      </nav>
    </header>

    <main id="site-main"></main>

    <footer class="footer" id="footer"></footer>
    <a class="zalo-float" id="zalo-float" target="_blank" rel="noopener">Zalo</a>
  </div>

  <form name="lead-form" class="hidden-netlify-form" data-netlify="true" netlify-honeypot="bot-field">
    <input type="hidden" name="form-name" value="lead-form" />
    <input name="name" />
    <input name="phone" />
    <input name="email" />
    <select name="tour"><option value=""></option></select>
  </form>

  <script>
    const DEFAULT_SITE = '/data/site.json';
    const REPO_BASE_PATH = location.hostname.endsWith('github.io') ? '/chauau' : '';

    const $ = (selector, parent = document) => parent.querySelector(selector);
    const escapeHTML = (value = '') => String(value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');

    function assetUrl(value) {
      if (!value) return '';
      if (/^(https?:|mailto:|tel:|#)/.test(value)) return value;
      if (value.startsWith('/')) return `${REPO_BASE_PATH}${value}`;
      return `${REPO_BASE_PATH}/${value}`;
    }

    function renderParagraphs(text = '') {
      return String(text).split('\n').filter(Boolean).map(line => `<p>${escapeHTML(line)}</p>`).join('');
    }

    function renderHeroTitle(title = '') {
      const parts = String(title).split('|').map(part => escapeHTML(part.trim())).filter(Boolean);
      if (parts.length <= 1) return escapeHTML(title);
      return `${parts[0]}<span>${parts.slice(1).join(' ')}</span>`;
    }

    function renderButtons(buttons = []) {
      return buttons.map(button => {
        const style = button.style === 'ghost' ? 'btn-ghost' : 'btn-primary';
        return `<a class="btn ${style}" href="${assetUrl(button.url || '#lead')}">${escapeHTML(button.text || 'Xem thêm')}</a>`;
      }).join('');
    }

    function updateSEO(site) {
      const seo = site.seo || {};
      const title = seo.title || site.brand?.name || document.title;
      const description = seo.description || '';
      document.title = title;
      setMeta('description', description);
      setMeta('robots', seo.robots || 'index,follow');
      setLink('canonical', seo.canonical || location.origin + location.pathname);
      setProperty('og:title', title);
      setProperty('og:description', description);
      setProperty('og:site_name', seo.site_name || site.brand?.name || 'Website');
      setProperty('og:image', assetUrl(seo.og_image || site.hero?.background_image || ''));
      setProperty('og:url', seo.canonical || location.href);
      setMeta('twitter:card', 'summary_large_image');
      setMeta('twitter:title', title);
      setMeta('twitter:description', description);
      setMeta('twitter:image', assetUrl(seo.og_image || site.hero?.background_image || ''));
      if (site.theme?.background) document.querySelector('meta[name="theme-color"]')?.setAttribute('content', site.theme.background);

      const jsonLd = {
        '@context': 'https://schema.org',
        '@type': 'TravelAgency',
        name: site.brand?.name || 'Travel Agency',
        url: seo.canonical || location.origin,
        logo: assetUrl(site.brand?.logo || site.footer?.logo || ''),
        image: assetUrl(seo.og_image || site.hero?.background_image || ''),
        telephone: site.footer?.phone || '',
        email: site.footer?.email || '',
        address: site.footer?.addresses?.join(', ') || '',
        sameAs: [site.footer?.website].filter(Boolean)
      };
      let script = document.getElementById('structured-data');
      if (!script) {
        script = document.createElement('script');
        script.type = 'application/ld+json';
        script.id = 'structured-data';
        document.head.appendChild(script);
      }
      script.textContent = JSON.stringify(jsonLd);
    }

    function setMeta(name, content) {
      if (!content) return;
      let el = document.querySelector(`meta[name="${name}"]`);
      if (!el) { el = document.createElement('meta'); el.setAttribute('name', name); document.head.appendChild(el); }
      el.setAttribute('content', content);
    }
    function setProperty(property, content) {
      if (!content) return;
      let el = document.querySelector(`meta[property="${property}"]`);
      if (!el) { el = document.createElement('meta'); el.setAttribute('property', property); document.head.appendChild(el); }
      el.setAttribute('content', content);
    }
    function setLink(rel, href) {
      if (!href) return;
      let el = document.querySelector(`link[rel="${rel}"]`);
      if (!el) { el = document.createElement('link'); el.setAttribute('rel', rel); document.head.appendChild(el); }
      el.setAttribute('href', href);
    }

    function applyTheme(theme = {}) {
      const root = document.documentElement;
      Object.entries({
        '--bg': theme.background,
        '--bg-soft': theme.background_soft,
        '--cream': theme.cream,
        '--gold': theme.gold,
        '--gold-dark': theme.gold_dark,
        '--accent': theme.accent,
        '--font-heading': theme.heading_font,
        '--font-body': theme.body_font
      }).forEach(([key, value]) => value && root.style.setProperty(key, value));
    }

    function renderNavigation(site) {
      $('#brand-logo').src = assetUrl(site.brand?.logo || site.footer?.logo || '');
      $('#brand-logo').alt = site.brand?.name || '';
      $('#brand-name').textContent = site.brand?.name || '';
      const navLinks = $('#nav-links');
      navLinks.innerHTML = (site.navigation || []).map(item => {
        const cls = item.is_button ? 'nav-cta' : 'nav-link';
        return `<a class="${cls}" href="${assetUrl(item.url || '#')}">${escapeHTML(item.label || '')}</a>`;
      }).join('');
    }

    function renderHero(hero = {}) {
      return `
        <section class="hero" id="home">
          <div class="hero-bg"><img src="${assetUrl(hero.background_image)}" alt="${escapeHTML(hero.background_alt || hero.title || '')}"></div>
          <div class="container hero-grid">
            <div class="hero-copy">
              ${hero.badge ? `<div class="eyebrow">${escapeHTML(hero.badge)}</div>` : ''}
              <h1 class="hero-title">${renderHeroTitle(hero.title || '')}</h1>
              <p class="lead">${escapeHTML(hero.subtitle || '')}</p>
              <div class="hero-actions">${renderButtons(hero.buttons || [])}</div>
            </div>
            <aside class="hero-card">
              <div class="hero-card__label">${escapeHTML(hero.highlight_label || '')}</div>
              <div class="hero-card__number">${escapeHTML(hero.highlight_number || '')}</div>
              <p class="hero-card__text">${escapeHTML(hero.highlight_text || '')}</p>
            </aside>
          </div>
        </section>`;
    }

    function renderAbout(about = {}) {
      return `
        <section class="section" id="experience">
          <div class="container about-grid">
            <div class="about-media">
              <img src="${assetUrl(about.image_1)}" alt="${escapeHTML(about.image_1_alt || '')}">
              <img src="${assetUrl(about.image_2)}" alt="${escapeHTML(about.image_2_alt || '')}">
            </div>
            <div>
              <div class="section-intro">
                ${about.eyebrow ? `<div class="eyebrow">${escapeHTML(about.eyebrow)}</div>` : ''}
                <h2>${escapeHTML(about.title || '')}</h2>
                <div class="rich-text">${renderParagraphs(about.body || '')}</div>
              </div>
              <div class="stats">
                ${(about.stats || []).map(stat => `
                  <div class="stat">
                    <div class="stat-number">${escapeHTML(stat.number || '')}</div>
                    <div class="stat-label">${escapeHTML(stat.label || '')}</div>
                  </div>`).join('')}
              </div>
            </div>
          </div>
        </section>`;
    }

    function renderTours(section = {}) {
      return `
        <section class="section section--soft" id="tours">
          <div class="container">
            <div class="section-intro">
              ${section.eyebrow ? `<div class="eyebrow">${escapeHTML(section.eyebrow)}</div>` : ''}
              <h2>${escapeHTML(section.title || '')}</h2>
              <p class="text-muted">${escapeHTML(section.subtitle || '')}</p>
            </div>
            <div class="tour-grid">
              ${(section.items || []).map(tour => `
                <article class="tour-card">
                  ${tour.badge ? `<div class="tour-badge">${escapeHTML(tour.badge)}</div>` : ''}
                  <div class="tour-image"><img src="${assetUrl(tour.image)}" alt="${escapeHTML(tour.image_alt || tour.title || '')}"></div>
                  <div class="tour-body">
                    <div class="tour-meta"><span>${escapeHTML(tour.category || '')}</span><span>${escapeHTML(tour.country_count || '')}</span></div>
                    <h3>${escapeHTML(tour.title || '')}</h3>
                    <p class="tour-route">${escapeHTML(tour.route || '')}</p>
                    <ul class="check-list">${(tour.highlights || []).map(item => `<li>${escapeHTML(item.text || item)}</li>`).join('')}</ul>
                    <div class="price-row"><span class="old-price">${escapeHTML(tour.old_price || '')}</span><span class="new-price">${escapeHTML(tour.new_price || '')}</span></div>
                    <a class="btn btn-primary" href="${assetUrl(tour.button_url || '#lead')}">${escapeHTML(tour.button_text || 'Đăng ký')}</a>
                  </div>
                </article>`).join('')}
            </div>
          </div>
        </section>`;
    }

    function renderGallery(gallery = {}) {
      return `
        <section class="section" id="gallery">
          <div class="container">
            <div class="section-intro">
              ${gallery.eyebrow ? `<div class="eyebrow">${escapeHTML(gallery.eyebrow)}</div>` : ''}
              <h2>${escapeHTML(gallery.title || '')}</h2>
              <p class="text-muted">${escapeHTML(gallery.subtitle || '')}</p>
            </div>
            <div class="gallery-grid">
              ${(gallery.items || []).map(item => `
                <figure class="gallery-item">
                  <img loading="lazy" src="${assetUrl(item.image)}" alt="${escapeHTML(item.alt || item.caption || '')}">
                  <figcaption class="gallery-caption">${escapeHTML(item.caption || '')}</figcaption>
                </figure>`).join('')}
            </div>
          </div>
        </section>`;
    }

    function renderPricing(pricing = {}) {
      return `
        <section class="section section--soft" id="pricing">
          <div class="container">
            <div class="section-intro">
              ${pricing.eyebrow ? `<div class="eyebrow">${escapeHTML(pricing.eyebrow)}</div>` : ''}
              <h2>${escapeHTML(pricing.title || '')}</h2>
              <p class="text-muted">${escapeHTML(pricing.subtitle || '')}</p>
            </div>
            <div class="pricing-grid">
              ${(pricing.items || []).map(item => `
                <article class="price-card ${item.featured ? 'is-featured' : ''}">
                  ${item.tag ? `<div class="price-tag">${escapeHTML(item.tag)}</div>` : ''}
                  <div class="price-subtitle">${escapeHTML(item.subtitle || '')}</div>
                  <h3>${escapeHTML(item.title || '')}</h3>
                  <div><span class="old-price">${escapeHTML(item.old_price || '')}</span><br><span class="new-price">${escapeHTML(item.new_price || '')}</span></div>
                  <ul class="check-list">${(item.features || []).map(feature => `<li>${escapeHTML(feature.text || feature)}</li>`).join('')}</ul>
                  <a class="btn ${item.featured ? 'btn-primary' : 'btn-ghost'}" style="${item.featured ? '' : 'background:#132238;color:#fff'}" href="${assetUrl(item.button_url || '#lead')}">${escapeHTML(item.button_text || 'Chọn hành trình')}</a>
                </article>`).join('')}
            </div>
          </div>
        </section>`;
    }

    function renderTestimonials(testimonials = {}) {
      return `
        <section class="section section--dark" id="customers">
          <div class="container">
            <div class="section-intro">
              ${testimonials.eyebrow ? `<div class="eyebrow">${escapeHTML(testimonials.eyebrow)}</div>` : ''}
              <h2>${escapeHTML(testimonials.title || '')}</h2>
              <p class="lead">${escapeHTML(testimonials.subtitle || '')}</p>
            </div>
            <div class="testimonials">
              ${(testimonials.items || []).map(item => `
                <article class="testimonial">
                  <div class="stars">${escapeHTML(item.stars || '★★★★★')}</div>
                  <p class="quote">“${escapeHTML(item.quote || '')}”</p>
                  <div class="person">
                    <img src="${assetUrl(item.avatar)}" alt="${escapeHTML(item.name || '')}">
                    <div><strong>${escapeHTML(item.name || '')}</strong><span>${escapeHTML(item.meta || '')}</span></div>
                  </div>
                </article>`).join('')}
            </div>
          </div>
        </section>`;
    }

    function renderLead(lead = {}, tours = []) {
      const options = (lead.form?.tour_options || tours.map(t => t.title)).map(option => `<option value="${escapeHTML(option.value || option)}">${escapeHTML(option.label || option)}</option>`).join('');
      return `
        <section class="section" id="lead">
          <div class="container cta-wrap">
            <aside class="countdown-card">
              ${lead.eyebrow ? `<div class="eyebrow">${escapeHTML(lead.eyebrow)}</div>` : ''}
              <h2 style="margin-top:12px">${escapeHTML(lead.title || '')}</h2>
              <p class="text-muted" style="margin-top:14px">${escapeHTML(lead.subtitle || '')}</p>
              <div class="countdown-grid" id="countdown" data-deadline="${escapeHTML(lead.deadline || '')}">
                ${['Ngày','Giờ','Phút','Giây'].map(label => `<div class="time-box"><div class="time-number">00</div><div class="time-label">${label}</div></div>`).join('')}
              </div>
            </aside>
            <section class="form-card">
              <h2>${escapeHTML(lead.form?.title || '')}</h2>
              <p class="text-muted" style="margin-top:12px">${escapeHTML(lead.form?.subtitle || '')}</p>
              <form class="form" name="lead-form" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="${assetUrl('/thank-you.html')}">
                <input type="hidden" name="form-name" value="lead-form">
                <p style="display:none"><label>Không điền ô này <input name="bot-field"></label></p>
                <div class="field"><label for="name">${escapeHTML(lead.form?.name_label || 'Họ tên')}</label><input id="name" name="name" required placeholder="${escapeHTML(lead.form?.name_placeholder || '')}"></div>
                <div class="field"><label for="phone">${escapeHTML(lead.form?.phone_label || 'Số điện thoại')}</label><input id="phone" name="phone" required placeholder="${escapeHTML(lead.form?.phone_placeholder || '')}"></div>
                <div class="field"><label for="email">${escapeHTML(lead.form?.email_label || 'Email')}</label><input id="email" name="email" type="email" placeholder="${escapeHTML(lead.form?.email_placeholder || '')}"></div>
                <div class="field"><label for="tour">${escapeHTML(lead.form?.tour_label || 'Tuyến tour')}</label><select id="tour" name="tour" required><option value="">${escapeHTML(lead.form?.tour_placeholder || 'Chọn tuyến tour')}</option>${options}</select></div>
                <button class="btn btn-primary" type="submit">${escapeHTML(lead.form?.button_text || 'Gửi đăng ký')}</button>
                <div class="form-note">${escapeHTML(lead.form?.privacy_note || '')}</div>
              </form>
            </section>
          </div>
        </section>`;
    }

    function renderFooter(footer = {}) {
      return `
        <div class="container footer-grid">
          <div>
            <img class="footer-logo" src="${assetUrl(footer.logo)}" alt="${escapeHTML(footer.logo_alt || footer.title || '')}">
            <h3>${escapeHTML(footer.title || '')}</h3>
            <p>${escapeHTML(footer.description || '')}</p>
          </div>
          <div>
            <h3>${escapeHTML(footer.contact_title || 'Liên hệ')}</h3>
            <ul class="contact-list">
              ${footer.phone ? `<li>☎ ${escapeHTML(footer.phone)}</li>` : ''}
              ${(footer.addresses || []).map(item => `<li>📍 ${escapeHTML(item.text || item)}</li>`).join('')}
              ${footer.email ? `<li>✉ ${escapeHTML(footer.email)}</li>` : ''}
              ${footer.hours ? `<li>⏰ ${escapeHTML(footer.hours)}</li>` : ''}
              ${footer.tax_code ? `<li>MST: ${escapeHTML(footer.tax_code)}</li>` : ''}
            </ul>
          </div>
        </div>
        <div class="container copyright">
          <span>${escapeHTML(footer.copyright || '')}</span>
          ${footer.website ? `<a href="${assetUrl(footer.website)}" target="_blank" rel="noopener">${escapeHTML(footer.website_label || footer.website)}</a>` : ''}
        </div>`;
    }

    function startCountdown() {
      const countdown = $('#countdown');
      if (!countdown) return;
      const boxes = [...countdown.querySelectorAll('.time-number')];
      const deadlineRaw = countdown.dataset.deadline;
      const deadline = deadlineRaw ? new Date(deadlineRaw) : new Date(Date.now() + 72 * 3600 * 1000);
      function tick() {
        let diff = Math.max(0, deadline.getTime() - Date.now());
        const days = Math.floor(diff / 86400000); diff %= 86400000;
        const hours = Math.floor(diff / 3600000); diff %= 3600000;
        const minutes = Math.floor(diff / 60000); diff %= 60000;
        const seconds = Math.floor(diff / 1000);
        [days,hours,minutes,seconds].forEach((value, i) => boxes[i].textContent = String(value).padStart(2, '0'));
      }
      tick();
      setInterval(tick, 1000);
    }

    function initInteractions() {
      const topbar = $('#topbar');
      const menuToggle = $('#menu-toggle');
      const navLinks = $('#nav-links');
      const onScroll = () => topbar.classList.toggle('is-scrolled', window.scrollY > 16);
      onScroll(); window.addEventListener('scroll', onScroll, { passive: true });
      menuToggle.addEventListener('click', () => {
        navLinks.classList.toggle('is-open');
        document.body.classList.toggle('menu-open', navLinks.classList.contains('is-open'));
      });
      navLinks.addEventListener('click', event => {
        if (event.target.closest('a')) {
          navLinks.classList.remove('is-open');
          document.body.classList.remove('menu-open');
        }
      });
    }

    function renderSite(site) {
      applyTheme(site.theme || {});
      updateSEO(site);
      renderNavigation(site);
      const main = $('#site-main');
      main.innerHTML = [
        renderHero(site.hero),
        renderAbout(site.about),
        renderTours(site.tours),
        renderGallery(site.gallery),
        renderPricing(site.pricing),
        renderTestimonials(site.testimonials),
        renderLead(site.lead, site.tours?.items || [])
      ].join('');
      $('#footer').innerHTML = renderFooter(site.footer || {});
      const zalo = $('#zalo-float');
      zalo.href = assetUrl(site.floating_contact?.url || '#lead');
      zalo.textContent = site.floating_contact?.label || 'Zalo';
      $('#site-loader').style.display = 'none';
      $('#site-shell').classList.add('is-ready');
      initInteractions();
      startCountdown();
    }

    fetch(`${REPO_BASE_PATH}${DEFAULT_SITE}`, { cache: 'no-cache' })
      .then(response => {
        if (!response.ok) throw new Error('Không tải được data/site.json');
        return response.json();
      })
      .then(renderSite)
      .catch(error => {
        console.error(error);
        $('#site-loader').innerHTML = '<div><h1 style="font-size:2rem">Không tải được nội dung</h1><p style="opacity:.75">Kiểm tra file data/site.json đã upload đúng chưa.</p></div>';
      });

    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', user => {
        if (!user) {
          window.netlifyIdentity.on('login', () => {
            document.location.href = '/admin/';
          });
        }
      });
    }
  </script>
</body>
</html>
