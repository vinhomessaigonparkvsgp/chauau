<!doctype html>
<html lang="vi">
<head>

  <title>Đăng ký thành công | Vietkite Travel</title>

    p{color:rgba(255,255,255,.78);font-size:1.1rem}
    a{display:inline-flex;margin-top:22px;background:#d7a84f;color:#241600;text-decoration:none;font-weight:900;padding:14px 22px;border-radius:999px}

<body>
  <main class="card">
    <h1>Đăng ký thành công!</h1>
