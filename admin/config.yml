backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "images/uploads"
public_folder: "/images/uploads"

site_url: "https://tourchauauvietkite.click"
display_url: "https://tourchauauvietkite.click"
logo_url: "https://vietkite.com.vn/wp-content/uploads/2024/12/logo-cty-canh-dieu-viet-vietkite.jpg"
locale: "vi"

collections:
  - name: "website"
    label: "Quản trị website"
    editor:
      preview: false
    files:
      - name: "site"
        label: "Toàn bộ nội dung trang chủ"
        file: "data/site.json"
        format: "json"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Title SEO", name: "title", widget: "string" }
              - { label: "Description SEO", name: "description", widget: "text" }
              - { label: "Canonical URL", name: "canonical", widget: "string", required: false }
              - { label: "Tên website", name: "site_name", widget: "string", required: false }
              - { label: "Ảnh chia sẻ mạng xã hội", name: "og_image", widget: "image", required: false }
              - { label: "Robots", name: "robots", widget: "string", default: "index,follow" }

          - label: "Màu sắc và font"
            name: "theme"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Nền chính", name: "background", widget: "color", required: false }
              - { label: "Nền phụ", name: "background_soft", widget: "color", required: false }
              - { label: "Màu kem", name: "cream", widget: "color", required: false }
              - { label: "Màu vàng", name: "gold", widget: "color", required: false }
              - { label: "Màu vàng đậm", name: "gold_dark", widget: "color", required: false }
              - { label: "Màu nhấn", name: "accent", widget: "color", required: false }
              - { label: "Font tiêu đề", name: "heading_font", widget: "string", required: false }
              - { label: "Font nội dung", name: "body_font", widget: "string", required: false }

          - label: "Thương hiệu"
            name: "brand"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Tên thương hiệu", name: "name", widget: "string" }
              - { label: "Logo", name: "logo", widget: "image" }

          - label: "Menu"
            name: "navigation"
            widget: "list"
            collapsed: true
            summary: "{{fields.label}} → {{fields.url}}"
            fields:
              - { label: "Tên menu", name: "label", widget: "string" }
              - { label: "Link", name: "url", widget: "string" }
              - { label: "Hiển thị dạng nút", name: "is_button", widget: "boolean", default: false }

          - label: "Hero đầu trang"
            name: "hero"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Nhãn nhỏ", name: "badge", widget: "string", required: false }
              - { label: "Tiêu đề lớn", name: "title", widget: "string", hint: "Dùng dấu | để xuống dòng đẹp. Ví dụ: Chạm Vào|Châu Âu Huyền Diệu" }
              - { label: "Mô tả", name: "subtitle", widget: "text" }
              - { label: "Ảnh nền", name: "background_image", widget: "image" }
              - { label: "Alt ảnh nền", name: "background_alt", widget: "string", required: false }
              - label: "Các nút bấm"
                name: "buttons"
                widget: "list"
                summary: "{{fields.text}}"
                fields:
                  - { label: "Text nút", name: "text", widget: "string" }
                  - { label: "Link", name: "url", widget: "string" }
                  - label: "Kiểu nút"
                    name: "style"
                    widget: "select"
                    options: ["primary", "ghost"]
                    default: "primary"
              - { label: "Nhãn ô nổi", name: "highlight_label", widget: "string", required: false }
              - { label: "Số ô nổi", name: "highlight_number", widget: "string", required: false }
              - { label: "Mô tả ô nổi", name: "highlight_text", widget: "text", required: false }

          - label: "Section giới thiệu"
            name: "about"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Nhãn nhỏ", name: "eyebrow", widget: "string", required: false }
              - { label: "Tiêu đề", name: "title", widget: "string" }
              - { label: "Nội dung", name: "body", widget: "text" }
              - { label: "Ảnh 1", name: "image_1", widget: "image" }
              - { label: "Alt ảnh 1", name: "image_1_alt", widget: "string", required: false }
              - { label: "Ảnh 2", name: "image_2", widget: "image" }
              - { label: "Alt ảnh 2", name: "image_2_alt", widget: "string", required: false }
              - label: "Các con số"
                name: "stats"
                widget: "list"
                summary: "{{fields.number}} - {{fields.label}}"
                fields:
                  - { label: "Số", name: "number", widget: "string" }
                  - { label: "Nhãn", name: "label", widget: "string" }

          - label: "Các tuyến tour"
            name: "tours"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Nhãn nhỏ", name: "eyebrow", widget: "string", required: false }
              - { label: "Tiêu đề", name: "title", widget: "string" }
              - { label: "Mô tả", name: "subtitle", widget: "string", required: false }
              - label: "Danh sách tour"
                name: "items"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - { label: "Badge", name: "badge", widget: "string", required: false }
                  - { label: "Nhóm tour", name: "category", widget: "string" }
                  - { label: "Số quốc gia", name: "country_count", widget: "string" }
                  - { label: "Tên tour", name: "title", widget: "string" }
                  - { label: "Tuyến đi", name: "route", widget: "string" }
                  - { label: "Ảnh tour", name: "image", widget: "image" }
                  - { label: "Alt ảnh", name: "image_alt", widget: "string", required: false }
                  - label: "Điểm nổi bật"
                    name: "highlights"
                    widget: "list"
                    fields:
                      - { label: "Nội dung", name: "text", widget: "string" }
                  - { label: "Giá cũ", name: "old_price", widget: "string", required: false }
                  - { label: "Giá mới", name: "new_price", widget: "string" }
                  - { label: "Text nút", name: "button_text", widget: "string" }
                  - { label: "Link nút", name: "button_url", widget: "string" }

          - label: "Thư viện ảnh"
            name: "gallery"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Nhãn nhỏ", name: "eyebrow", widget: "string", required: false }
              - { label: "Tiêu đề", name: "title", widget: "string" }
              - { label: "Mô tả", name: "subtitle", widget: "text", required: false }
              - label: "Danh sách ảnh"
                name: "items"
                widget: "list"
                summary: "{{fields.caption}}"
                fields:
                  - { label: "Ảnh", name: "image", widget: "image" }
                  - { label: "Chú thích", name: "caption", widget: "string" }
                  - { label: "Alt ảnh", name: "alt", widget: "string", required: false }

          - label: "Bảng giá"
            name: "pricing"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Nhãn nhỏ", name: "eyebrow", widget: "string", required: false }
              - { label: "Tiêu đề", name: "title", widget: "string" }
              - { label: "Mô tả", name: "subtitle", widget: "string", required: false }
              - label: "Gói giá"
                name: "items"
                widget: "list"
                summary: "{{fields.title}} - {{fields.new_price}}"
                fields:
                  - { label: "Tên gói", name: "title", widget: "string" }
                  - { label: "Mô tả ngắn", name: "subtitle", widget: "string" }
                  - { label: "Giá cũ", name: "old_price", widget: "string", required: false }
                  - { label: "Giá mới", name: "new_price", widget: "string" }
                  - { label: "Tag", name: "tag", widget: "string", required: false }
                  - { label: "Gói nổi bật", name: "featured", widget: "boolean", default: false }
                  - label: "Quyền lợi"
                    name: "features"
                    widget: "list"
                    fields:
                      - { label: "Nội dung", name: "text", widget: "string" }
                  - { label: "Text nút", name: "button_text", widget: "string" }
                  - { label: "Link nút", name: "button_url", widget: "string" }

          - label: "Đánh giá khách hàng"
            name: "testimonials"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Nhãn nhỏ", name: "eyebrow", widget: "string", required: false }
              - { label: "Tiêu đề", name: "title", widget: "string" }
              - { label: "Mô tả", name: "subtitle", widget: "string", required: false }
              - label: "Danh sách đánh giá"
                name: "items"
                widget: "list"
                summary: "{{fields.name}}"
                fields:
                  - { label: "Sao", name: "stars", widget: "string", default: "★★★★★" }
                  - { label: "Nội dung đánh giá", name: "quote", widget: "text" }
                  - { label: "Ảnh đại diện", name: "avatar", widget: "image" }
                  - { label: "Tên khách", name: "name", widget: "string" }
                  - { label: "Thông tin tour", name: "meta", widget: "string" }

          - label: "Form đăng ký và countdown"
            name: "lead"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Nhãn ưu đãi", name: "eyebrow", widget: "string", required: false }
              - { label: "Tiêu đề", name: "title", widget: "string" }
              - { label: "Mô tả", name: "subtitle", widget: "text" }
              - { label: "Hạn countdown", name: "deadline", widget: "datetime", required: false, hint: "Ví dụ: 2026-12-31T23:59:59+07:00" }
              - label: "Nội dung form"
                name: "form"
                widget: "object"
                fields:
                  - { label: "Tiêu đề form", name: "title", widget: "string" }
                  - { label: "Mô tả form", name: "subtitle", widget: "text", required: false }
                  - { label: "Label họ tên", name: "name_label", widget: "string" }
                  - { label: "Placeholder họ tên", name: "name_placeholder", widget: "string", required: false }
                  - { label: "Label số điện thoại", name: "phone_label", widget: "string" }
                  - { label: "Placeholder số điện thoại", name: "phone_placeholder", widget: "string", required: false }
                  - { label: "Label email", name: "email_label", widget: "string" }
                  - { label: "Placeholder email", name: "email_placeholder", widget: "string", required: false }
                  - { label: "Label chọn tour", name: "tour_label", widget: "string" }
                  - { label: "Placeholder chọn tour", name: "tour_placeholder", widget: "string" }
                  - label: "Các lựa chọn tour"
                    name: "tour_options"
                    widget: "list"
                    summary: "{{fields.label}}"
                    fields:
                      - { label: "Tên hiển thị", name: "label", widget: "string" }
                      - { label: "Giá trị gửi form", name: "value", widget: "string" }
                  - { label: "Text nút gửi", name: "button_text", widget: "string" }
                  - { label: "Ghi chú bảo mật", name: "privacy_note", widget: "string", required: false }

          - label: "Footer"
            name: "footer"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Logo footer", name: "logo", widget: "image" }
              - { label: "Alt logo", name: "logo_alt", widget: "string", required: false }
              - { label: "Tiêu đề footer", name: "title", widget: "string" }
              - { label: "Mô tả footer", name: "description", widget: "text" }
              - { label: "Tiêu đề liên hệ", name: "contact_title", widget: "string" }
              - { label: "Số điện thoại", name: "phone", widget: "string" }
              - label: "Địa chỉ"
                name: "addresses"
                widget: "list"
                summary: "{{fields.text}}"
                fields:
                  - { label: "Địa chỉ", name: "text", widget: "string" }
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Giờ làm việc", name: "hours", widget: "string", required: false }
              - { label: "Mã số thuế", name: "tax_code", widget: "string", required: false }
              - { label: "Website", name: "website", widget: "string", required: false }
              - { label: "Text website", name: "website_label", widget: "string", required: false }
              - { label: "Copyright", name: "copyright", widget: "string" }

          - label: "Nút Zalo nổi"
            name: "floating_contact"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Text nút", name: "label", widget: "string" }
              - { label: "Link", name: "url", widget: "string" }
